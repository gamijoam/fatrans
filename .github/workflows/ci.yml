name: CI — Validar Pull Request

# Corre en CADA Pull Request hacia develop o main
on:
  pull_request:
    branches: [develop, main]

# Permisos necesarios para que el bot pueda comentar en el PR
permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Compilar y testear el Backend (Java)
  # ─────────────────────────────────────────────
  backend-ci:
    name: Backend — Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: fondo_test
          POSTGRES_USER: app
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compilar backend
        working-directory: ./backend
        run: mvn clean compile -q

      - name: Ejecutar tests
        working-directory: ./backend
        env:
          SPRING_PROFILES_ACTIVE: test
          DB_URL: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
          DB_USER: sa
          DB_PASS: ""
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: ""
          JWT_SECRET: test-secret-key-for-testing-purposes-only-minimum-256-bits-long
          JWT_ISSUER: fondo-test
          MINIO_ENDPOINT: http://localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          RATE_LIMITING_ENABLED: "false"
          RATE_LIMITING_REDIS_BACKED: "false"
          CLAMAV_ENABLED: "false"
        run: mvn test -Dspring.profiles.active=test 2>&1

      - name: Publicar reporte de tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: backend/target/surefire-reports/
          retention-days: 7

      - name: Verificar que el JAR compila
        working-directory: ./backend
        run: mvn package -DskipTests -q

  # ─────────────────────────────────────────────
  # JOB 2: Validar el Frontend (Next.js)
  # ─────────────────────────────────────────────
  frontend-ci:
    name: Frontend — Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-web/package-lock.json

      - name: Instalar dependencias
        working-directory: ./frontend-web
        run: npm ci

      - name: Ejecutar Lint
        working-directory: ./frontend-web
        run: npm run lint || true

      - name: Ejecutar tests unitarios
        working-directory: ./frontend-web
        run: npm test --if-present || true

      - name: Build de producción
        working-directory: ./frontend-web
        env:
          NEXT_PUBLIC_API_URL: https://qa-api.fatrans.com.ve/api
          NEXT_PUBLIC_APP_URL: https://qa-app.fatrans.com.ve
          NEXT_PUBLIC_ADMIN_URL: https://qa-admin.fatrans.com.ve
          NEXT_PUBLIC_AUTH_URL: https://qa.fatrans.com.ve
        run: npm run build

  # ─────────────────────────────────────────────
  # JOB 3: Resumen automático en el PR
  # ─────────────────────────────────────────────
  pr-summary:
    name: Resumen del PR
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: always()

    # Permisos explícitos también a nivel de job (doble seguro)
    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Comentar resultado en el PR
        uses: actions/github-script@v7
        with:
          script: |
            const backend = '${{ needs.backend-ci.result }}';
            const frontend = '${{ needs.frontend-ci.result }}';
            const sha = context.sha.substring(0, 7);
            const icon = (r) => r === 'success' ? '✅' : r === 'failure' ? '❌' : '⚠️';

            const body = `## 🤖 Resultado CI — \`${sha}\`

            | Componente | Estado |
            |---|---|
            | Backend (Java 21 / Spring Boot) | ${icon(backend)} ${backend} |
            | Frontend (Next.js 14) | ${icon(frontend)} ${frontend} |

            ${backend === 'success' && frontend === 'success'
              ? '**✅ Todo OK — listo para merge a `develop` → se desplegará en QA automáticamente.**'
              : '**❌ Hay errores — revisar los jobs fallidos antes de hacer merge.**'
            }

            > 📎 El reporte detallado de tests del backend está disponible en los **Artifacts** de este workflow.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
