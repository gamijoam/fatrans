name: CI — Validar Pull Request

# Corre en CADA Pull Request hacia develop o main
on:
  pull_request:
    branches: [develop, main]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Compilar y testear el Backend (Java)
  # ─────────────────────────────────────────────
  backend-ci:
    name: Backend — Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: fondo_test
          POSTGRES_USER: app
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compilar backend
        working-directory: ./backend
        run: mvn clean compile -q

      - name: Ejecutar tests
        working-directory: ./backend
        env:
          DB_URL: jdbc:postgresql://localhost:5432/fondo_test
          DB_USER: app
          DB_PASS: testpass
          JWT_SECRET: test-secret-key-para-ci-con-minimo-32-caracteres
          REDIS_HOST: localhost
          MINIO_ENDPOINT: http://localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
        run: mvn test -q

      - name: Verificar que el JAR compila para producción
        working-directory: ./backend
        run: mvn package -DskipTests -q

  # ─────────────────────────────────────────────
  # JOB 2: Validar el Frontend (Next.js)
  # ─────────────────────────────────────────────
  frontend-ci:
    name: Frontend — Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-web/package-lock.json

      - name: Instalar dependencias
        working-directory: ./frontend-web
        run: npm ci

      - name: Ejecutar Lint
        working-directory: ./frontend-web
        run: npm run lint || true

      - name: Ejecutar tests unitarios
        working-directory: ./frontend-web
        run: npm test --if-present || true

      - name: Build de producción
        working-directory: ./frontend-web
        env:
          NEXT_PUBLIC_API_URL: https://qa-api.fatrans.com.ve/api
          NEXT_PUBLIC_APP_URL: https://qa-app.fatrans.com.ve
        run: npm run build

  # ─────────────────────────────────────────────
  # JOB 3: Resumen del PR (comentario automático)
  # ─────────────────────────────────────────────
  pr-summary:
    name: Resumen del PR
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: always()

    steps:
      - name: Comentar resultado en el PR
        uses: actions/github-script@v7
        with:
          script: |
            const backend = '${{ needs.backend-ci.result }}';
            const frontend = '${{ needs.frontend-ci.result }}';
            const sha = context.sha.substring(0, 7);

            const icon = (r) => r === 'success' ? '✅' : r === 'failure' ? '❌' : '⚠️';

            const body = `## 🤖 Resultado CI — \`${sha}\`

            | Componente | Estado |
            |---|---|
            | Backend (Java/Spring Boot) | ${icon(backend)} ${backend} |
            | Frontend (Next.js) | ${icon(frontend)} ${frontend} |

            ${backend === 'success' && frontend === 'success'
              ? '**✅ Todo OK — listo para merge a `develop` → se desplegará en QA automáticamente.**'
              : '**❌ Hay errores — revisar los jobs fallidos antes de hacer merge.**'
            }`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
