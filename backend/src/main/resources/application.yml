spring:
  application:
    name: fondo-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/fondo}
    username: ${DB_USER:app}
    password: ${DB_PASS}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1

  # SMTP de Zoho — credenciales en .env.{prod,qa} via MAIL_USERNAME/MAIL_PASSWORD.
  # Si están vacías, JavaMailSender se construye igual pero `enviar` falla con
  # AuthenticationFailedException — `EmailNotificationServiceImpl` chequea
  # `fatrans.mail.enabled` antes de intentar, así que en dev/test no rompe.
  mail:
    host: ${MAIL_HOST:smtp.zoho.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          starttls:
            enable: false
        debug: ${MAIL_DEBUG:false}

  servlet:
    multipart:
      max-file-size: ${PRODUCT_IMAGE_MAX_FILE_SIZE:2MB}
      max-request-size: ${PRODUCT_IMAGE_MAX_REQUEST_SIZE:3MB}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}
  issuer: ${JWT_ISSUER:fondo-ahorro-platform}
  accessToken:
    expirationMinutes: ${JWT_ACCESS_EXPIRATION_MINUTES:15}
  refreshToken:
    expirationDays: ${JWT_REFRESH_EXPIRATION_DAYS:7}
  sesion:
    ventana-inicializacion-segundos: ${JWT_WINDOW_SECONDS:60}

clamav:
  host: ${CLAMAV_HOST:localhost}
  port: ${CLAMAV_PORT:3310}
  timeout-ms: ${CLAMAV_TIMEOUT:60000}
  enabled: ${CLAMAV_ENABLED:true}

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin123}

storage:
  bucket:
    kyc: bucket-kyc

# ============================================
# KYC BIOMÉTRICO - PROVEEDOR DIDIT
# ============================================
# Habilitar solo cuando se configuren las env vars; deshabilitado por defecto
# permite que la app arranque sin credenciales (los endpoints biométricos
# devuelven KYCException explícita).
fatrans:
  kyc:
    didit:
      enabled: ${DIDIT_ENABLED:false}
      api-key: ${DIDIT_API_KEY:}
      webhook-secret: ${DIDIT_WEBHOOK_SECRET:}
      workflow-id: ${DIDIT_WORKFLOW_ID:}
      base-url: ${DIDIT_BASE_URL:https://verification.didit.me/v2}
      callback-url: ${DIDIT_CALLBACK_URL:}
      webhook-timestamp-tolerance-seconds: 300
  # ============================================
  # NOTIFICACIONES POR EMAIL (Zoho SMTP)
  # ============================================
  # Si `enabled=false` o faltan credenciales, EmailNotificationServiceImpl cae a
  # modo mock (loguea, no manda). Permite que la app arranque sin credenciales
  # y que los tests no toquen SMTP real.
  mail:
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_FROM:no-reply@fatrans.com.ve}
    from-name: ${MAIL_FROM_NAME:Fatrans}
    # URL pública del frontend protected — usada en los emails para links
    # (login, dashboard). Cambia entre PROD y QA.
    app-base-url: ${MAIL_APP_BASE_URL:https://app.fatrans.com.ve}
    # Email del super admin para notificaciones operacionales (nueva solicitud
    # pendiente de aprobar, etc.). Vacío = no manda emails al admin.
    admin-notification: ${MAIL_ADMIN_NOTIFICATION:}

# ============================================
# MÓDULO DOCUMENTOS PDF - CONFIGURACIÓN
# ============================================
documentospdf:
  # Configuración de buckets MinIO segregados
  buckets:
    documentos: bucket-documentos
    contratos: bucket-contratos
    pagares: bucket-pagares
    creditos: bucket-creditos
    temporal: bucket-temporal
  # TTL de pre-signed URLs en minutos
  presigned-url:
    expiration-minutes: 15
  # Duración de documentos (para expiración automática)
  document-expiration:
    estado-cuenta-days: 7
    constancia-afiliacion-days: 365
    tabla-amortizacion-days: 30
  # Rate limiting
  rate-limit:
    generation-per-user-per-minute: 5
    generation-per-ip-per-minute: 20
    download-per-user-per-minute: 10
  # Firma digital RSA para contratos y pagarés
  firma-digital:
    enabled: true
    algoritmo: SHA256withRSA
    keystore-path: ${DOC_FIRMA_KEYSTORE:/etc/fondo/firma-digital.p12}
    keystore-password: ${DOC_FIRMA_PASSWORD:}
    key-alias: ${DOC_FIRMA_KEY_ALIAS:documentos-fondo}
    keystore-type: PKCS12

# ============================================
# RATE LIMITING CENTRALIZADO (REDIS)
# ============================================
rate-limiting:
  enabled: true
  redis-backed: true
  endpoints:
    - path: /api/v1/auth/login
      limit: 5
      window: MINUTES
    - path: /api/v1/auth/registro
      limit: 3
      window: MINUTES
    - path: /api/v1/admin/**
      limit: 30
      window: MINUTES
    - path: /api/v1/socios/**
      limit: 60
      window: MINUTES
    - path: /api/v1/cuentas/**
      limit: 30
      window: MINUTES
    - path: /api/v1/creditos/simular
      limit: 10
      window: MINUTES
    - path: /api/v1/creditos/**
      limit: 30
      window: MINUTES
    - path: /api/v1/documentos/**
      limit: 20
      window: MINUTES
