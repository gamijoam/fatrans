version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: fatrans_postgres_local
    environment:
      POSTGRES_DB: fondo
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${DB_PASS:-fatrans_dev_pass}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "15432:5432"
    networks:
      - fatrans_local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d fondo"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fatrans_redis_local
    command: redis-server --requirepass ${REDIS_PASS:-fatrans_redis_pass} --appendonly yes
    ports:
      - "16379:6379"
    networks:
      - fatrans_local
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASS:-fatrans_redis_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: fatrans_minio_local
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-fatrans_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-fatrans_minio_secret_123}
    volumes:
      - minio_data:/data
    ports:
      - "19000:9000"
      - "19001:9001"
    networks:
      - fatrans_local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: fatrans_backend_local
    ports:
      - "18080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:postgresql://postgres:5432/fondo
      DB_USER: app
      DB_PASS: ${DB_PASS:-fatrans_dev_pass}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASS:-fatrans_redis_pass}
      JWT_SECRET: ${JWT_SECRET:-desarrollo_jwt_secret_no_usar_en_produccion_256bits}
      JWT_ISSUER: fondo-ahorro-platform
      JWT_ACCESS_EXPIRATION_MINUTES: 15
      JWT_REFRESH_EXPIRATION_DAYS: 7
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-fatrans_minio}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-fatrans_minio_secret_123}
      CORS_ORIGINS: "http://localhost:3000,http://localhost:3001,http://127.0.0.1:3000,http://127.0.0.1:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - fatrans_local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================
  # FRONTEND PUBLICO - Landing + Auth
  # Puerto: 3000
  # ===========================================
  frontend_public:
    build:
      context: ../frontend-web
      dockerfile: Dockerfile
    container_name: fatrans_frontend_public_local
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:18080/api
      NEXT_PUBLIC_APP_URL: http://localhost:3001
    depends_on:
      - backend
    networks:
      - fatrans_local
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================
  # FRONTEND PROTEGIDO - App + Admin
  # Puerto: 3001
  # ===========================================
  frontend_protected:
    build:
      context: ../frontend-web
      dockerfile: Dockerfile
    container_name: fatrans_frontend_protected_local
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:18080/api
      NEXT_PUBLIC_APP_URL: http://localhost:3001
    depends_on:
      - backend
    networks:
      - fatrans_local
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  minio_init:
    image: minio/mc:latest
    container_name: fatrans_minio_init_local
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh
    command: >
      -c "sleep 10 &&
          mc alias set local http://minio:9000 fatrans_minio fatrans_minio_secret_123 2>/dev/null || true &&
          mc mb local/fondodocs --ignore-existing 2>/dev/null || true &&
          mc mb local/bucket-kyc --ignore-existing 2>/dev/null || true &&
          mc mb local/bucket-documentos --ignore-existing 2>/dev/null || true &&
          mc mb local/bucket-contratos --ignore-existing 2>/dev/null || true &&
          mc mb local/bucket-creditos --ignore-existing 2>/dev/null || true &&
          mc anonymous set public local/fondodocs 2>/dev/null || true &&
          exit 0"
    networks:
      - fatrans_local
    restart: "no"

networks:
  fatrans_local:
    driver: bridge

volumes:
  pg_data:
  minio_data:
